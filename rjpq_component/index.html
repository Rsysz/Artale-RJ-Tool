<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            font-family: 'Open Sans', sans-serif;
            background-color: transparent;
            margin: 0;
            padding: 0;
        }
        #board-container {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .floor-row {
            display: grid;
            grid-template-columns: 50px repeat(4, 1fr);
            gap: 8px;
            align-items: center;
        }
        .floor-name {
            color: #888;
            text-align: right;
            font-weight: bold;
            line-height: 38px;
        }
        .p-cell {
            display: flex;
            flex-direction: column;
        }
        .p-btn {
            display: block;
            height: 38px;
            line-height: 38px;
            text-align: center;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            border: 1px solid #444;
            font-size: 18px;
            transition: 0.1s;
            user-select: none;
        }
        .p-btn:hover { filter: brightness(1.2); }
        .ex-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 3px;
            margin-top: 3px;
            padding: 0 4px;
        }
        .ex-dot {
            height: 6px;
            border-radius: 2px;
            cursor: pointer;
            user-select: none;
            transition: opacity 0.1s;
        }
        .ex-dot:hover { filter: brightness(1.3); }
    </style>
</head>
<body>
    <div id="board-container"></div>

    <script>
        // ─── Streamlit 通訊層（內聯，不依賴任何 CDN）─────────────────────────
        const Streamlit = {
            _renderCallbacks: [],
            setComponentValue(value) {
                window.parent.postMessage(
                    { isStreamlitMessage: true, type: "streamlit:setComponentValue", value },
                    "*"
                );
            },
            setFrameHeight(height) {
                window.parent.postMessage(
                    { isStreamlitMessage: true, type: "streamlit:setFrameHeight",
                      height: height != null ? height : document.body.scrollHeight },
                    "*"
                );
            },
            onRender(callback) {
                this._renderCallbacks.push(callback);
            },
            _ready() {
                window.parent.postMessage(
                    { isStreamlitMessage: true, type: "streamlit:componentReady", apiVersion: 1 },
                    "*"
                );
            }
        };

        window.addEventListener("message", (event) => {
            if (event.data.type === "streamlit:render") {
                Streamlit._renderCallbacks.forEach(cb =>
                    cb({ detail: { args: event.data.args } })
                );
            }
        });

        // ─── 戰術板邏輯 ───────────────────────────────────────────────────────
        const COLOR_CONFIG = {
            "Red":    { "hex": "#FF4B4B" },
            "Blue":   { "hex": "#1C83E1" },
            "Green":  { "hex": "#28B62C" },
            "Yellow": { "hex": "#FFD700" }
        };

        let currentRoomData = null;
        let currentBrush    = "Red";
        let pendingSync     = false;  // 點擊後鎖定，防止舊資料從伺服器覆蓋本地
        const container = document.getElementById('board-container');

        function handleClick(floor, slotIdx, action, color) {
            const slot = currentRoomData[floor][slotIdx];
            if (action === "main") {
                if (slot["main"] === currentBrush) {
                    slot["main"] = null;
                } else {
                    // 同一層內先清除自己的舊佔位
                    currentRoomData[floor].forEach(s => {
                        if (s["main"] === currentBrush) s["main"] = null;
                    });
                    slot["main"] = currentBrush;
                }
            } else if (action === "exclude") {
                const idx = slot["excludes"].indexOf(color);
                if (idx > -1) slot["excludes"].splice(idx, 1);
                else          slot["excludes"].push(color);
            }
            renderBoard();
            pendingSync = true;  // 鎖定：等 Python 把新資料存回並送 onRender 後才解鎖
            Streamlit.setComponentValue(currentRoomData);
        }

        function renderBoard() {
            container.innerHTML = "";
            for (let fIdx = 10; fIdx >= 1; fIdx--) {
                const fKey      = fIdx + "F";
                const floorData = currentRoomData[fKey];
                const floorRow  = document.createElement('div');
                floorRow.className = 'floor-row';

                const floorName = document.createElement('div');
                floorName.className = 'floor-name';
                floorName.innerText = fKey;
                floorRow.appendChild(floorName);

                [4, 3, 2, 1].forEach(pNum => {
                    const pIdx = 4 - pNum;
                    const slot = floorData[pIdx];

                    const pCell = document.createElement('div');
                    pCell.className = 'p-cell';

                    const pBtn = document.createElement('div');
                    pBtn.className = 'p-btn';
                    pBtn.innerText = pNum;
                    pBtn.style.background = slot["main"]
                        ? COLOR_CONFIG[slot["main"]]["hex"] : "#262730";
                    pBtn.style.color = slot["main"] ? "black" : "#eee";
                    pBtn.onclick = () => handleClick(fKey, pIdx, "main");
                    pCell.appendChild(pBtn);

                    const exGrid = document.createElement('div');
                    exGrid.className = 'ex-grid';
                    Object.keys(COLOR_CONFIG).forEach(cName => {
                        const dot = document.createElement('div');
                        dot.className = 'ex-dot';
                        dot.style.background = COLOR_CONFIG[cName]["hex"];
                        dot.style.opacity = slot["excludes"].includes(cName) ? "1.0" : "0.08";
                        dot.onclick = () => handleClick(fKey, pIdx, "exclude", cName);
                        exGrid.appendChild(dot);
                    });
                    pCell.appendChild(exGrid);
                    floorRow.appendChild(pCell);
                });
                container.appendChild(floorRow);
            }
        }

        Streamlit.onRender(function(event) {
            const args = event.detail.args;
            if (args.brush) currentBrush = args.brush;

            const incomingStr = JSON.stringify(args.room_data);
            const currentStr  = JSON.stringify(currentRoomData);

            if (currentRoomData === null) {
                // 第一次載入，直接套用
                currentRoomData = JSON.parse(incomingStr);
                renderBoard();
            } else if (pendingSync) {
                // 剛剛有本地點擊還未確認：
                // 若伺服器送回的資料已經包含我們的點擊（表示成功存回），解鎖
                // 若送回的還是舊資料（計時器搶先），忽略這次 render 保留本地狀態
                if (incomingStr === currentStr) {
                    pendingSync = false;  // 伺服器確認了，解鎖
                }
                // 不論如何都不覆寫 currentRoomData，保護本地剛點的內容
            } else if (incomingStr !== currentStr) {
                // 正常同步：來自其他用戶的更新，套用
                currentRoomData = JSON.parse(incomingStr);
                renderBoard();
            }

            Streamlit.setFrameHeight(document.body.scrollHeight);
        });

        Streamlit._ready();
    </script>
</body>
</html>
